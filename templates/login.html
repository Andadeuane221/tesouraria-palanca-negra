<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Tesouraria Palanca Negra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-top: 5px solid #1e3d59; /* Azul do cabeçalho do clube */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .btn-primary {
            background-color: #1e3d59;
            border: none;
        }
        .btn-primary:hover {
            background-color: #173046;
        }
    </style>
</head>
<body>

<div class="card login-card p-4 bg-white rounded">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">Palanca Negra</h3>
        <span class="text-muted text-uppercase small tracking-wider">Departamento de Tesouraria</span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} url-fade-out p-2 small text-center" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="mb-3">
            <label for="username" class="form-label text-secondary small fw-bold">Usuário</label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="Ex: admin">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label text-secondary small fw-bold">Senha Secreta</label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 mt-2 fw-bold">Entrar no Painel</button>
    </form>
</div>

</body>
</html>
